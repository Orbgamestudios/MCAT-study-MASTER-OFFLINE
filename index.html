<script>
  // Apply persisted theme before paint to avoid flash. Theme is a (palette, mode)
  // pair; "system" mode follows the OS. Older single-string themes are migrated.
  (function () {
    function resolve(palette, mode) {
      var dark = mode === 'dark' ||
        (mode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (palette === 'warm') return dark ? 'darkwarm' : 'warm';
      if (palette === 'duo') return dark ? 'darkgreen' : 'green';
      if (palette === 'tropical') return dark ? 'darktropical' : 'tropical';
      if (palette === 'madison') return dark ? 'darkmadison' : 'madison';
      if (palette === 'gambit') return dark ? 'darkgambit' : 'gambit';
      return dark ? 'dark' : 'light';
    }
    try {
      var raw = JSON.parse(localStorage.getItem('mcat:theme'));
      var palette = 'cold', mode = 'system';
      if (raw && typeof raw === 'object') {
        palette = raw.palette || 'cold';
        mode = raw.mode || 'system';
      } else if (typeof raw === 'string') {
        var map = {
          dark: ['cold', 'dark'], light: ['cold', 'light'], system: ['cold', 'system'],
          warm: ['warm', 'light'], darkwarm: ['warm', 'dark'],
          green: ['duo', 'light'], darkgreen: ['duo', 'dark'],
          gambit: ['gambit', 'light'], darkgambit: ['gambit', 'dark'],
        };
        var m = map[raw] || ['cold', 'system'];
        palette = m[0]; mode = m[1];
      }
      document.documentElement.setAttribute('data-theme', resolve(palette, mode));
    } catch (e) { document.documentElement.setAttribute('data-theme', 'dark'); }
  })();
</script>

    --text-fainter: #4d6651;
    --accent: #58cc02;
    --accent-hover: #6fe018;
    --accent-text: #a3e87a;
    --accent-border: #58cc02;
    --accent-soft: rgb(88 204 2 / 0.15);
    --accent-2: #1cb0f6;
    --accent-2-text: #7fd3f9;
    --success-bg: rgb(20 80 30 / 0.45);
    --success-bg-strong: rgb(20 80 30 / 0.6);
    --success-text: #86e05f;
    --success-border: #58cc02;
    --danger-bg: rgb(120 35 25 / 0.45);
    --danger-bg-strong: rgb(120 35 25 / 0.6);
    --danger-text: #f0a090;
    --danger-border: #e85d3a;
    --warning-bg: rgb(110 75 20 / 0.4);
    --warning-text: #ecca78;
    --warning-text-strong: #f2d68e;
  }

  /* ── Tropical solid teal borders ──────────────────────────────────── */
  :root[data-theme="tropical"]    .rounded-2xl,
  :root[data-theme="darktropical"] .rounded-2xl {
    border-color: var(--accent-border) !important;
  }

  /* Dynamic background is applied entirely via JS (see app.js tropicalBg/getDynamicBg)
     so it works correctly for all colour palettes in both light and dark mode. */

  /* ══ Experimental UI · Part 1: clean visual refresh ══════════════════
     Everything below is scoped under :root[data-exp="on"] (Settings →
     Experimental UI) and cannot affect the default look. The scope
     prefix also outranks Tailwind's responsive/state variants, so any
     variant whose value must survive the refresh is re-asserted inside
     the media block / leading rules below. */

  /* Type scale: 12 / 14 / 16 / 20 / 28, plus an untouched display tier
     (text-4xl/5xl hero numerals). Micro 10/11px labels move up to 12px;
     lg joins xl at 20px; 2xl/3xl collapse to 28px. The periodic table's
     7/8px cell text is intentionally left alone. */
  :root[data-exp="on"] .text-\[10px\],
  :root[data-exp="on"] .text-\[11px\],
  :root[data-exp="on"] .text-\[12px\] { font-size: 0.75rem; line-height: 1.3; }
  :root[data-exp="on"] .text-xs   { line-height: 1.35; }
  :root[data-exp="on"] .text-sm   { line-height: 1.45; }
  :root[data-exp="on"] .text-base { line-height: 1.5; }
  :root[data-exp="on"] .text-lg,
  :root[data-exp="on"] .text-xl   { font-size: 1.25rem; line-height: 1.35; }
  :root[data-exp="on"] .text-2xl,
  :root[data-exp="on"] .text-3xl  { font-size: 1.75rem; line-height: 1.2; letter-spacing: -0.015em; }
  :root[data-exp="on"] .text-4xl,
  :root[data-exp="on"] .text-5xl  { letter-spacing: -0.02em; }
  @media (min-width: 640px) {
    :root[data-exp="on"] .sm\:text-xs   { font-size: 0.75rem; }
    :root[data-exp="on"] .sm\:text-sm   { font-size: 0.875rem; }
    :root[data-exp="on"] .sm\:text-base { font-size: 1rem; line-height: 1.5; }
    :root[data-exp="on"] .sm\:text-lg   { font-size: 1.25rem; line-height: 1.35; }
    :root[data-exp="on"] .sm\:text-3xl  { font-size: 1.75rem; line-height: 1.2; }
    :root[data-exp="on"] .sm\:text-4xl  { font-size: 2.25rem; line-height: 1.1; }
    :root[data-exp="on"] .sm\:text-5xl  { font-size: 3rem; line-height: 1.05; }
  }
  /* Deliberate leadings keep winning over the scale defaults above. */
  :root[data-exp="on"] .leading-none    { line-height: 1; }
  :root[data-exp="on"] .leading-tight   { line-height: 1.25; }
  :root[data-exp="on"] .leading-snug    { line-height: 1.375; }
  :root[data-exp="on"] .leading-relaxed { line-height: 1.625; }

  /* Two UI weights: bold folds into semibold (500 / 600 only). */
  :root[data-exp="on"] .font-bold { font-weight: 600; }

  /* One control radius: the 4px tier (bare rounded on nav tabs, chips,
     header buttons) and stray rounded-sm/md join rounded-lg at 8px.
     Cards stay rounded-2xl, nested boxes stay rounded-xl. */
  :root[data-exp="on"] .rounded,
  :root[data-exp="on"] .rounded-sm,
  :root[data-exp="on"] .rounded-md { border-radius: 0.5rem; }

  /* One card surface: soft elevation everywhere, quiet borders on
     containers. Interactive controls (buttons, inputs, selects) keep
     the stronger --border for affordance. */
  :root[data-exp="on"] { --exp-card-shadow: 0 1px 2px rgb(2 6 23 / 0.05), 0 12px 32px -16px rgb(2 6 23 / 0.18); }
  :root[data-exp="on"][data-theme^="dark"] { --exp-card-shadow: 0 1px 2px rgb(0 0 0 / 0.35), 0 12px 32px -16px rgb(0 0 0 / 0.55); }
  :root[data-exp="on"] .rounded-2xl { box-shadow: var(--exp-card-shadow); }
  :root[data-exp="on"] div.border-\[var\(--border\)\] { border-color: var(--border-soft); }

  /* Card padding collapses to one tier: p-6 cards step down to 20px so
     every top-level card reads 16px mobile / 20px desktop. */
  :root[data-exp="on"] .rounded-2xl.p-6 { padding: 1.25rem; }
  @media (min-width: 640px) {
    :root[data-exp="on"] .rounded-2xl.sm\:p-6 { padding: 1.25rem; }
  }

  /* Calmer accent: one tint strength across palettes (was 10–18%). */
  :root[data-exp="on"] { --accent-soft: color-mix(in srgb, var(--accent) 10%, transparent); }
  :root[data-exp="on"][data-theme^="dark"] { --accent-soft: color-mix(in srgb, var(--accent) 14%, transparent); }

  /* 44px minimum tap height on the primary tab bar. */
  :root[data-exp="on"] header nav button { min-height: 44px; }

  /* ══ Experimental UI · Part 2: liquid glass ══════════════════════════
     Clear-glass skin, only when BOTH toggles are on. Glass surfaces =
     top-level cards (.rounded-2xl with a --bg-card* background), the
     fixed header, header controls, and accent CTA buttons — nested
     boxes stay solid so iOS Safari keeps GPU headroom. Each surface
     gets: low-alpha fill (color-mix scales every theme's own alpha),
     backdrop blur+saturate, a refraction ripple (Chromium only, see
     @supports below), a gradient hairline ring (::before) and a
     diagonal specular sheen (::after) for the reflective look. */
  :root[data-exp="on"][data-glass="on"] {
    --glass-filter: blur(10px) saturate(170%);
    --glass-btn-filter: blur(8px) saturate(170%);
    --glass-inner:
      inset 0 -16px 32px -24px rgb(2 6 23 / 0.10),
      inset 0 0 14px -6px rgb(255 255 255 / 0.22);
    --glass-ring: linear-gradient(135deg, rgb(255 255 255 / 0.65), rgb(255 255 255 / 0.12) 30%, rgb(255 255 255 / 0.03) 55%, rgb(255 255 255 / 0.30));
    --glass-sheen:
      linear-gradient(115deg, rgb(255 255 255 / 0.18), rgb(255 255 255 / 0.05) 20%, transparent 45%, transparent 75%, rgb(255 255 255 / 0.08)),
      radial-gradient(120% 60% at 50% -10%, rgb(255 255 255 / 0.12), transparent 60%),
      radial-gradient(80% 50% at 8% 108%, rgb(255 255 255 / 0.07), transparent 55%);
  }
  :root[data-exp="on"][data-glass="on"][data-theme^="dark"] {
    --glass-inner:
      inset 0 -16px 32px -24px rgb(0 0 0 / 0.45),
      inset 0 0 14px -6px rgb(255 255 255 / 0.10);
    --glass-ring: linear-gradient(135deg, rgb(255 255 255 / 0.35), rgb(255 255 255 / 0.07) 30%, rgb(255 255 255 / 0.02) 55%, rgb(255 255 255 / 0.16));
    --glass-sheen:
      linear-gradient(115deg, rgb(255 255 255 / 0.10), rgb(255 255 255 / 0.03) 20%, transparent 45%, transparent 75%, rgb(255 255 255 / 0.05)),
      radial-gradient(120% 60% at 50% -10%, rgb(255 255 255 / 0.07), transparent 60%),
      radial-gradient(80% 50% at 8% 108%, rgb(255 255 255 / 0.04), transparent 55%);
  }
  /* Real refraction (feDisplacementMap over the backdrop) is Chromium-
     only: Safari/iOS and Firefox drop the entire backdrop-filter when a
     url() reference is present, hence the @supports gate (excludes iOS
     via -webkit-touch-callout, macOS Safari via -apple-system-body).
     Chromium composites SVG backdrop filters in software, so the ripple
     is limited to SMALL surfaces (header chips, accent buttons); cards
     and the header fake refraction with static optics instead (gradient
     edge ring, corner bloom, refractive inner edge glow). If desktop
     scrolling ever feels heavy with the dynamic background on, delete
     this @supports block — everything else stands alone. */
  @supports (not (-webkit-touch-callout: none)) and (not (font: -apple-system-body)) {
    :root[data-exp="on"][data-glass="on"] {
      --glass-btn-filter: blur(8px) saturate(170%) url(#lg-dist);
    }
  }

  :root[data-exp="on"][data-glass="on"] .rounded-2xl.bg-\[var\(--bg-card\)\],
  :root[data-exp="on"][data-glass="on"] .rounded-2xl.bg-\[var\(--bg-card-strong\)\],
  :root[data-exp="on"][data-glass="on"] .rounded-2xl.bg-\[var\(--bg-card-soft\)\] {
    position: relative;
    -webkit-backdrop-filter: var(--glass-filter);
    backdrop-filter: var(--glass-filter);
    border-color: color-mix(in srgb, var(--border-soft) 45%, transparent);
    box-shadow: var(--glass-inner), var(--exp-card-shadow);
  }
  :root[data-exp="on"][data-glass="on"] .rounded-2xl.bg-\[var\(--bg-card\)\] {
    background-color: color-mix(in srgb, var(--bg-card) 58%, transparent);
  }
  :root[data-exp="on"][data-glass="on"] .rounded-2xl.bg-\[var\(--bg-card-strong\)\] {
    background-color: color-mix(in srgb, var(--bg-card-strong) 76%, transparent);
  }
  :root[data-exp="on"][data-glass="on"] .rounded-2xl.bg-\[var\(--bg-card-soft\)\] {
    background-color: color-mix(in srgb, var(--bg-card-soft) 48%, transparent);
  }

  /* Gradient hairline ring — a 1px ring of varying brightness so edges
     catch "light" like polished glass. */
  :root[data-exp="on"][data-glass="on"] .rounded-2xl.bg-\[var\(--bg-card\)\]::before,
  :root[data-exp="on"][data-glass="on"] .rounded-2xl.bg-\[var\(--bg-card-strong\)\]::before,
  :root[data-exp="on"][data-glass="on"] .rounded-2xl.bg-\[var\(--bg-card-soft\)\]::before {
    content: "";
    position: absolute;
    inset: -1px;
    border-radius: inherit;
    padding: 1px;
    background: var(--glass-ring);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask-composite: exclude;
    pointer-events: none;
  }
  /* Diagonal specular sheen across the surface. */
  :root[data-exp="on"][data-glass="on"] .rounded-2xl.bg-\[var\(--bg-card\)\]::after,
  :root[data-exp="on"][data-glass="on"] .rounded-2xl.bg-\[var\(--bg-card-strong\)\]::after,
  :root[data-exp="on"][data-glass="on"] .rounded-2xl.bg-\[var\(--bg-card-soft\)\]::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: var(--glass-sheen);
    pointer-events: none;
  }

  /* Top bar: properly transparent so scrolling content refracts under
     it; bottom hairline stays from the base border-b. */
  :root[data-exp="on"][data-glass="on"] header.fixed {
    background-color: color-mix(in srgb, var(--bg) 52%, transparent);
    -webkit-backdrop-filter: var(--glass-filter);
    backdrop-filter: var(--glass-filter);
    box-shadow: inset 0 1px 0 rgb(255 255 255 / 0.10);
  }

  /* Header controls: the active tab and the bordered buttons (Sign in,
     Settings, account) become glass chips. Inactive tabs stay bare. */
  :root[data-exp="on"][data-glass="on"] header nav button.bg-\[var\(--bg-hover\)\],
  :root[data-exp="on"][data-glass="on"] header button.border-\[var\(--border\)\] {
    background-color: color-mix(in srgb, var(--bg-hover) 55%, transparent);
    -webkit-backdrop-filter: var(--glass-btn-filter);
    backdrop-filter: var(--glass-btn-filter);
    border-color: color-mix(in srgb, var(--border-soft) 45%, transparent);
    box-shadow: inset 0 1px 0 rgb(255 255 255 / 0.22), inset 0 0 0 1px rgb(255 255 255 / 0.05);
  }

  /* Accent CTAs (Start, Save, primary actions): translucent tinted
     glass with a specular top edge instead of a flat solid fill. */
  :root[data-exp="on"][data-glass="on"] button.bg-\[var\(--accent\)\] {
    background-color: color-mix(in srgb, var(--accent) 75%, transparent);
    -webkit-backdrop-filter: var(--glass-btn-filter);
    backdrop-filter: var(--glass-btn-filter);
    box-shadow:
      inset 0 1px 0 rgb(255 255 255 / 0.40),
      inset 0 -1px 0 rgb(0 0 0 / 0.15),
      0 4px 16px -6px color-mix(in srgb, var(--accent) 55%, transparent);
  }

  /* A11y: Reduce Transparency → solid surfaces, no blur, no overlays.
     Browsers without the media feature skip this block (glass stays). */
  @media (prefers-reduced-transparency: reduce) {
    :root[data-exp="on"][data-glass="on"] .rounded-2xl.bg-\[var\(--bg-card\)\],
    :root[data-exp="on"][data-glass="on"] .rounded-2xl.bg-\[var\(--bg-card-strong\)\],
    :root[data-exp="on"][data-glass="on"] .rounded-2xl.bg-\[var\(--bg-card-soft\)\] {
      background-color: var(--bg-card-strong);
      -webkit-backdrop-filter: none;
      backdrop-filter: none;
      box-shadow: var(--exp-card-shadow);
    }
    :root[data-exp="on"][data-glass="on"] .rounded-2xl.bg-\[var\(--bg-card\)\]::before,
    :root[data-exp="on"][data-glass="on"] .rounded-2xl.bg-\[var\(--bg-card-strong\)\]::before,
    :root[data-exp="on"][data-glass="on"] .rounded-2xl.bg-\[var\(--bg-card-soft\)\]::before,
    :root[data-exp="on"][data-glass="on"] .rounded-2xl.bg-\[var\(--bg-card\)\]::after,
    :root[data-exp="on"][data-glass="on"] .rounded-2xl.bg-\[var\(--bg-card-strong\)\]::after,
    :root[data-exp="on"][data-glass="on"] .rounded-2xl.bg-\[var\(--bg-card-soft\)\]::after {
      content: none;
    }
    :root[data-exp="on"][data-glass="on"] header.fixed,
    :root[data-exp="on"][data-glass="on"] header nav button.bg-\[var\(--bg-hover\)\],
    :root[data-exp="on"][data-glass="on"] header button.border-\[var\(--border\)\],
    :root[data-exp="on"][data-glass="on"] button.bg-\[var\(--accent\)\] {
      -webkit-backdrop-filter: none;
      backdrop-filter: none;
    }
    :root[data-exp="on"][data-glass="on"] header.fixed { background-color: var(--bg); }
    :root[data-exp="on"][data-glass="on"] button.bg-\[var\(--accent\)\] { background-color: var(--accent); }
  }

</style>
</head>
<body>
<!-- Liquid-glass refraction filter — referenced as backdrop-filter url(#lg-dist)
     from the Part 2 glass CSS, Chromium-only via @supports (see that block). -->
<svg aria-hidden="true" focusable="false" style="position:absolute;width:0;height:0">
  <filter id="lg-dist" x="-5%" y="-5%" width="110%" height="110%" color-interpolation-filters="sRGB">
    <feTurbulence type="fractalNoise" baseFrequency="0.012 0.012" numOctaves="1" seed="7" result="noise"/>
    <feGaussianBlur in="noise" stdDeviation="1.5" result="soft"/>
    <feDisplacementMap in="SourceGraphic" in2="soft" scale="24" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</svg>
<div id="root"></div>
<script>
  // Crash diagnostics — installed BEFORE Babel/React so iOS Safari users (no devtools)
  // get a visible, actionable error message even if app.js fails to parse, React fails
  // to mount, or an async handler throws. Last error also persists to localStorage so
  // reloads can replay it.
  (function () {
    var LOG_KEY = 'mcat:crashlog';
    function readLog() {
      try { return JSON.parse(localStorage.getItem(LOG_KEY)) || []; } catch (e) { return []; }
    }
    function writeLog(entries) {
      try { localStorage.setItem(LOG_KEY, JSON.stringify(entries.slice(-10))); } catch (e) {}
    }
    function showBanner(msg, allEntries) {
      var existing = document.getElementById('_crash_banner');
      if (existing) existing.remove();
      var el = document.createElement('div');
      el.id = '_crash_banner';
      el.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#c0392b;color:#fff;font:13px/1.4 -apple-system,sans-serif;padding:10px 14px;max-height:60vh;overflow:auto';
      var html = '<div style="display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap"><strong>App error</strong>';
      html += '<span style="flex:1;min-width:200px;word-break:break-all;font-family:ui-monospace,monospace;font-size:12px">' + msg.replace(/[<&]/g, function (c) { return c === '<' ? '&lt;' : '&amp;'; }) + '</span>';
      html += '<button id="_cb_reload" style="background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:5px;padding:4px 10px;font-size:12px">Reload</button>';
      html += '<button id="_cb_clear" style="background:rgba(255,255,255,.35);border:none;color:#fff;border-radius:5px;padding:4px 10px;font-size:12px">Clear data &amp; reload</button>';
      html += '<button id="_cb_log" style="background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:5px;padding:4px 10px;font-size:12px">Show log</button>';
      html += '</div>';
      html += '<pre id="_cb_logpane" style="display:none;margin-top:10px;padding:8px;background:rgba(0,0,0,.35);border-radius:6px;white-space:pre-wrap;word-break:break-all;font-size:11px;line-height:1.35"></pre>';
      el.innerHTML = html;
      (document.body || document.documentElement).appendChild(el);
      document.getElementById('_cb_reload').onclick = function () { location.reload(); };
      document.getElementById('_cb_clear').onclick = function () {
        try {
          ['mcat:questions', 'mcat:extractions', 'mcat:files', 'mcat:crashlog'].forEach(function (k) { localStorage.removeItem(k); });
        } catch (e) {}
        location.reload();
      };
      document.getElementById('_cb_log').onclick = function () {
        var pane = document.getElementById('_cb_logpane');
        var open = pane.style.display === 'none';
        pane.style.display = open ? 'block' : 'none';
        if (open) {
          pane.textContent = (allEntries || readLog()).map(function (e) {
            return '[' + new Date(e.t).toLocaleTimeString() + '] ' + e.m + (e.s ? '\n' + e.s : '');
          }).join('\n\n');
        }
      };
    }
    function record(msg, stack) {
      var log = readLog();
      log.push({ t: Date.now(), m: msg, s: stack || '' });
      writeLog(log);
      showBanner(msg, log);
    }
    window.addEventListener('error', function (e) {
      var loc = e.filename ? ' (' + e.filename.split('/').pop() + ':' + e.lineno + ':' + e.colno + ')' : '';
      var msg = ((e.error && e.error.message) || e.message || 'Unknown error') + loc;
      var stack = e.error && e.error.stack ? String(e.error.stack) : '';
      record(msg, stack);
    });
    window.addEventListener('unhandledrejection', function (e) {
      var reason = e.reason;
      var msg = (reason && reason.message) || String(reason) || 'Unhandled promise rejection';
      var stack = (reason && reason.stack) ? String(reason.stack) : '';
      record(msg, stack);
    });
    // Watchdog: if React never paints into #root within 8s of DOMContentLoaded,
    // surface whatever's in the crash log (or a generic "didn't mount" message).
    window.addEventListener('DOMContentLoaded', function () {
      setTimeout(function () {
        var root = document.getElementById('root');
        if (root && root.childElementCount === 0) {
          var log = readLog();
          var last = log.length ? log[log.length - 1] : null;
          var msg = last ? ('App failed to mount. Last error: ' + last.m) : 'App failed to mount within 8s. Tap "Show log" for any prior errors, or "Clear data & reload".';
          showBanner(msg, log);
        }
      }, 8000);
    });
    // Replay the last crash on next load — so if the user reloads after a crash,
    // they still see what happened.
    window.addEventListener('DOMContentLoaded', function () {
      var log = readLog();
      if (!log.length) return;
      var last = log[log.length - 1];
      // Only show stale crash if it's recent (last 10 min) and React hasn't mounted in 1s.
      if (Date.now() - last.t > 10 * 60 * 1000) return;
      setTimeout(function () {
        if (document.getElementById('_crash_banner')) return;
        var root = document.getElementById('root');
        if (root && root.childElementCount > 0) return;
        showBanner('Previous load crashed: ' + last.m, log);
      }, 1000);
    });
  })();
</script>
<script>
  (function () {
    var v = '194';
    if (window.__MCAT_LEGACY_BOOT__) {
      document.write('<script src="app.legacy.js?v=' + v + '"><\/script>');
    } else {
      document.write('<script type="text/babel" data-presets="react" src="app.js?v=' + v + '"><\/script>');
    }
  })();
</script>
<script>
  // Service worker: caches the app shell + vendored libs so the app boots
  // offline. Registered after load so it never blocks first paint. The SW
  // takes over on the next launch (no reload-loop); see sw.js for the
  // versioned-cache update flow.
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('sw.js').catch(function (e) {
        console.warn('SW registration failed:', e);
      });
    });
  }
</script>
</body>
</html>
